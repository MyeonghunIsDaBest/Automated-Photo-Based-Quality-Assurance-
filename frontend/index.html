<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <title>SiteProof — quote to cash for trade businesses</title>
    <meta
      name="description"
      content="Jobs, stock, quotes, and photo-backed site records in one place — SiteProof runs the trade business end to end."
    />

    <!-- Warm-ledger paper — keeps the iOS/Android status bar matching the
         app chrome both in standalone PWA mode and the regular browser tab. -->
    <meta name="theme-color" content="#FAF8F2" />

    <!-- iOS PWA / Add-to-Home-Screen support. Without these the on-site
         workers can't install the app from Safari. -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="SiteProof" />

    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
