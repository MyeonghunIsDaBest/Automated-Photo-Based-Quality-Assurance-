# Supabase CLI config — only needed if you want to run a *local* Supabase
# stack (Postgres + Auth + Storage in Docker) for development. A hosted
# project on supabase.com works fine without this file.
#
# Quick start with the CLI:
#   npm install -g supabase
#   supabase init        # already done — this file is the result
#   supabase start       # boots the local stack on http://127.0.0.1:54321
#   supabase db reset    # applies migrations/*.sql + seed.sql
#
# Docs: https://supabase.com/docs/guides/cli/local-development

project_id = "siteproof-qa"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "20MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[realtime]
enabled = true

[edge_runtime]
enabled = true
